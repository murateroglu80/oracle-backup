ORACLE_CONFIG:
  ORACLE_HOSTNAME: "db-server.example.local"
  ORACLE_UNQNAME: "ORCL"
  ORACLE_BASE: "/u01/app/oracle"
  ORACLE_HOME: "/u01/app/oracle/product/19.0.0/db_1"
  ORACLE_SID: "ORCL"
  ORACLE_TERM: "xterm"
  NLS_DATE_FORMAT: "DD-MON-YYYY HH24:MI:SS"

GI_CONFIG:
  GI_ENABLED: False
  GRID_HOME: "/u01/app/19/grid"

TARGET_SERVER:
  enabled: False
  host: "db-server.example.local"
  user: "oracle"
  port: 22
  key_file: "~/.ssh/id_rsa"

BACKUP_CONFIG:
  backup_root: "/backup"
  log_dir: "~/huaris/logs"
  pid_file: "/tmp/rman_backup_ORCL.pid"
  history_dir: "~/huaris/history"
  fallback_size_gb: 300
  space_buffer_pct: 0.20
  keep_days: 7
  remote_dest: "oracle@192.168.1.100:/share/oracle"
  transfer_method: "scp" # "rsync" or "scp"
  transfer_hours: [20] # List of hours like [20, 23], or "all" to transfer on every run
  device_type: "DISK" # DISK or SBT_TAPE
  parallelism: 4
  rman_script_file: "" # Optional: path to custom .rman file. Empty = use RMAN_TEMPLATE

# RMAN Template - Her bölüm True/False ile açılıp kapatılabilir
RMAN_TEMPLATE:
  full_backup: True
  archive_backup: True
  controlfile_backup: True
  spfile_backup: True
  cleanup:
    delete_obsolete: True
    recovery_window_days: 1
    crosscheck_archivelog: True
    crosscheck_backup: True
    report_obsolete: True
    delete_expired_archivelog: True
    delete_expired_controlfile: True
    delete_obsolete_orphan: True
    archive_retention_days: 2
  extra_commands: []
  # extra_commands örnekleri:
  #   - "BACKUP CURRENT CONTROLFILE FOR STANDBY FORMAT '{path}/Standby_CTL_%d_%T_%U.rman';"
  #   - "VALIDATE BACKUPSET 123;"

MAIL_CONFIG:
  enabled: False
  use_auth: True
  notification_level: "INFO" # INFO, WARNING, ERROR
  smtp_host: "smtp.example.com"
  smtp_port: 587
  smtp_user: "noreply@example.com"
  use_tls: True
  from_addr: "noreply@example.com"
  to_addrs: 
    - "dba-team@example.com"
  subject_prefix: "[RMAN BACKUP]"
  daily_mail_hour: 23 # Send mail at this hour (e.g. 23) or set to "all" to send after every run

VAULT_CONFIG:
  enabled: False
  url: "http://127.0.0.1:8200"
  token: "hvs.your-vault-token-here"
  secret_path: "secret/data/mail"

MONITORING_CONFIG:
  enabled: False
  type: "prometheus" # or "zabbix"
  pushgateway_url: "http://127.0.0.1:9091/metrics/job/oracle_backup"
  zabbix_server: "127.0.0.1"
  zabbix_host: "db-server.example.local"
